name = "pokedex-news"
main = "src/index.js"
compatibility_date = "2025-09-01"

# edge cache is handled via the Cache API in code — no KV/R2/D1 bindings
# needed. the worker is stateless: every request either reads the edge cache
# or re-fetches the upstream sources and writes back.

# after `wrangler deploy`, the default url will be:
#   https://pokedex-news.<your-subdomain>.workers.dev
# paste that into app/src/pages/news-page.jsx as NEWS_API_URL.

# twitch live-status endpoint (/live) reads this channel slug. change it via
# the wrangler.toml + redeploy if the streamer handle ever changes. NOT a
# secret — the channel is public.
[vars]
TWITCH_CHANNEL = "shockwavexr"

# secrets (set via `npx wrangler secret put NAME`, NOT here):
#   TWITCH_CLIENT_ID      — from https://dev.twitch.tv/console/apps
#   TWITCH_CLIENT_SECRET  — same console, "new secret" button
