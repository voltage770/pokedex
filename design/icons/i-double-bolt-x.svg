<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#1a1a1f"/>
  <!-- Two diagonal lightning bolts crossing at center, formed by rotating a vertical bolt ±45° -->
  <g transform="rotate(45 512 512)">
    <path d="M 555 220 L 360 540 L 490 540 L 460 800 L 670 460 L 540 460 Z" fill="#f5d042"/>
  </g>
  <g transform="rotate(-45 512 512)">
    <path d="M 555 220 L 360 540 L 490 540 L 460 800 L 670 460 L 540 460 Z" fill="#f5d042"/>
  </g>
</svg>
