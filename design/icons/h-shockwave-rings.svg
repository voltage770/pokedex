<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#1a1a1f"/>
  <!-- Concentric pulsing rings, opacity ramps up toward center -->
  <circle cx="512" cy="512" r="450" fill="none" stroke="#f5d042" stroke-width="6" opacity="0.22"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="#f5d042" stroke-width="10" opacity="0.42"/>
  <circle cx="512" cy="512" r="270" fill="none" stroke="#f5d042" stroke-width="14" opacity="0.65"/>
  <circle cx="512" cy="512" r="180" fill="none" stroke="#f5d042" stroke-width="18" opacity="0.88"/>
  <circle cx="512" cy="512" r="80" fill="#f5d042"/>
</svg>
